# k8s/worker.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  
  name: ml-worker-deployment
  
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    
    matchLabels:
      
      app: ml-worker
      
  template:
    
    metadata:
      
      labels:
        
        app: ml-worker
        
    spec:
      
      volumes:
      - name: input-storage
        persistentVolumeClaim:
          claimName: video-input-pvc

      - name: archive-storage
        persistentVolumeClaim:
          claimName: video-archive-pvc

      containers:
        
      - name: worker-container
        
        image: {{ .Values.worker.image }}:{{ .Values.worker.tag }}  # <-- Dynamicznie dzięki Helmowi
                
        # --- NOWY KOD: PODPIECIE MOSTU DO KONTENERA ---
        volumeMounts:
        - name: input-storage
          mountPath: /app/video-input

        - name: archive-storage
          mountPath: /app/video-archive
        # ----------------------------------------------
        
        resources:
          
          requests:
            memory: "1Gi"
            cpu: "300m"
          limits:
            memory: "2Gi"
            cpu: "800m"