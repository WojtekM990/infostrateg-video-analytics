apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-streaming-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-streaming
  template:
    metadata:
      labels:
        app: spark-streaming
    spec:
      containers:
        - name: spark-streaming
          image: ghcr.io/wojtekm990/spark-streaming:{{ .Values.spark.tag | default "latest" }}
          env:
            - name: MYSQL_HOST
              value: "mysql-service"
            - name: MYSQL_DB_PORT
              value: "3306"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "400m"