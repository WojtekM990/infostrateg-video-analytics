# k8s/api.yaml

apiVersion: apps/v1

kind: Deployment

metadata:
  
  name: video-api-deployment
  
spec:
  
  replicas: 1
  
  selector:
    
    matchLabels:
      
      app: video-api
      
  template:
    
    metadata:
      
      labels:
        
        app: video-api
        
    spec:
      
      containers:
        
      - name: api-container
        
        image: video-api:v4
        
        imagePullPolicy: Never
        
        env:
          
        # Zmienne laczace API z baza
          
        - name: DB_HOST
          
          value: "mysql-service"
          
        - name: DB_USER
          
          value: "root"
          
        - name: DB_PASSWORD
          
          value: "infostrateg_root"
          
        # Wymagany port bazy danych
          
        - name: MYSQL_DB_PORT
          
          value: "3306"
          
        ports:
          
        - containerPort: 8080

---

apiVersion: v1

kind: Service

metadata:
  
  name: video-api-service
  
spec:
  
  type: LoadBalancer
  
  ports:
    
  - port: 80
    
    targetPort: 8080
    
  selector:
    
    app: video-api